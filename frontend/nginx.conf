server {
    # ${PORT} is substituted at container start (see Dockerfile). Hosts like
    # Railway inject PORT; locally it defaults to 80. NGINX_ENVSUBST_FILTER
    # restricts substitution to PORT so nginx's own $uri is left intact.
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback so client-side routes resolve.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
